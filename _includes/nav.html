<nav class="site-nav" aria-label="Main navigation">
  <ul>
    {% for item in site.navigation %}
    <li>
      <a href="{{ item.url | relative_url }}"
         {% assign item_path = item.url | append: 'index.html' %}
         {% if page.url == item.url or page.url == item_path %}class="active" aria-current="page"{% endif %}>
        {{ item.title }}
      </a>
    </li>
    {% endfor %}
  </ul>
</nav>
